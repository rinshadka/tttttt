name: Update MD from TAP

on:
  workflow_dispatch:
  push:
    paths:
      - "*.tap"

jobs:
  update-md:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract values from TAP
        id: extract
        run: |
          TAP_FILE=$(ls *.tap | head -n1)

          VERSION=$(grep "Surveilr Version:" $TAP_FILE | awk -F': ' '{print $2}')
          DATE=$(grep "Execution Date:" $TAP_FILE | awk -F': ' '{print $2}')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Update markdown
        run: |
          VERSION=${{ steps.extract.outputs.version }}
          DATE=${{ steps.extract.outputs.date }}

          echo "Updating cycle to $VERSION"
          echo "Updating date to $DATE"

          sed -i "s/cycle: .*/cycle: $VERSION/g" *.md
          sed -i "s/cycle-date: .*/cycle-date: $DATE/g" *.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.md
          git commit -m "Update cycle and date from TAP file" || echo "No changes"
          git push
